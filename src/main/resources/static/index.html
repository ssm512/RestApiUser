<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>REST API User CRUD</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
    <style>
        main {width: 80%; margin: 30px auto;}
        table, th, td {
            border-collapse: collapse;
            border: 1px solid #ccc;
        }
        th, td {padding: 10px; text-align: center;}
        #div1 {margin-top: 30px; margin-bottom: 200px;}
        #list button {border:0; background: #fff;}
        #list tr:hover:not(:first-child) {background: yellow;}
        .form-table input {width: 260px;}
        .message {margin-top:15px; font-weight: 600;}
        .error {color: #b00020;}
        .success {color: #0a6b2b;}
    </style>
</head>
<body>
<main>
    <h2>회원 REST API 테스트</h2>
    <form id="form1">
        <table class="form-table">
            <tr>
                <td>아이디</td>
                <td><input type="text" id="userid" required></td>
            </tr>
            <tr>
                <td>암호</td>
                <td><input type="text" id="passwd" required></td>
            </tr>
            <tr>
                <td>이름</td>
                <td><input type="text" id="username" required></td>
            </tr>
            <tr>
                <td>이메일</td>
                <td><input type="email" id="email"></td>
            </tr>
            <tr>
                <td>가입일</td>
                <td><input type="text" id="indate" readonly></td>
            </tr>
            <tr>
                <td colspan="2">
                    <a id="btnInsert" class="btn btn-primary btn-sm" href="#">추가</a>
                    <a id="btnUpdate" class="btn btn-warning btn-sm" href="#">수정</a>
                    <a id="btnDelete" class="btn btn-danger btn-sm" href="#">삭제</a>
                    <input type="button" id="btnClear" class="btn btn-info btn-sm" value="Clear">
                </td>
            </tr>
        </table>
    </form>
    <div id="message" class="message"></div>
    <hr>
    <div>
        아이디<input type="text" id="text" placeholder="검색어"/>
        <button id="btnOk" class="btn btn-secondary btn-sm">검색</button>
    </div>

    <div id="div1"></div>
</main>
<!-- ---------------------------------------------------------------------------------------------- -->
<script>
    const API_URL = '/api/users'; // 기본 api 주소

    // #div1 table ui 시작
    // display header 문자열 작업
    function table_header() {
        return `
            <tr>
                <th>아이디</th>
                <th>이름</th>
                <th>이메일</th>
                <th>가입일</th>
                <th>삭제</th>
            </tr>
        `;
    }

    // 조회한 datalist 출력
    function datalist_display(datalist) {
        let html = `<table id="list" class="table table-striped">`;
        html += table_header();
        datalist.forEach(user => {
            const userid = user.userid;
            const username = user.username;
            const email = user.email;
            const indate = user.indate;
            let tr = `
                <tr data-userid="${userid}">
                    <td>${userid}</td>
                    <td>${username}</td>
                    <td>${email}</td>
                    <td>${indate}</td>
                    <td><button type="button" class="btnDel">🗑</button></td>
                </tr>
            `
            html += tr;
        })
        html += `</table>`;

        const div1El = document.getElementById('div1');
        div1El.innerHTML = html;
    }

    // text_clear 함수
    function text_clear() {
        const useridEl = document.getElementById('userid');
        const usernameEl = document.getElementById('username');
        const emailEl = document.getElementById('email');
        const passwdEl = document.getElementById('passwd');
        const indateEl = document.getElementById('indate');

        useridEl.value = '';
        usernameEl.value = '';
        emailEl.value = '';
        passwdEl.value = '';
        indateEl.value = '';

        useridEl.focus();
    }


    // 여기까지가 화면 처리에 대한 부분임
    /*-----------------------------------------------------------------------------------------*/

    // data 조작
    // data 목록 조회
    // API_URL = '/aip/users'
    // GET http://localhost:8080/api/users
    // GET http://localhost:8080/api/users?keyword=user
    // encodeURIComponent가 필요한 이유는 주소줄은 bit로 단위로 돌아다님
    // 따라서 UTF-8로 변환해야함
    async function getUsers() {
        const keywordEl = document.getElementById('text');
        const keyword = keywordEl.value.trim();
        const url = (keyword)
            ? `${API_URL}?keyword=${encodeURIComponent(keyword)}`
            :API_URL;
        const datalist = await requestJson(url);
        datalist_display(datalist);
    }

    // data_insert
    async function data_insert() {
        const options = {
            method: 'POST',
            body: JSON.stringify({
                userid: 'foo',
                passwd: 'bar',
                username: 'foobar',
                email: 'foobar@example.com'
            }),
            headers: {
                'Content-type': 'application/json; charset=UTF-8',
            }
        }
        await requestJson(API_URL, options);
        text_clear();
        await getUsers();
    }

    // data_delete()
    // DELETE http://localhost:8080/api/users/test01
    async function data_delete ( userid ) {
        // API_URI = /api/users
        // DELETE /api/users/test1
        await requestJson(`${API_URL}/${userid}`, {
            method: 'DELETE'
        })

        text_clear();
        await getUsers(); // data 전체조회
    }

    // requestJson 함수
    // 비동기 async
    // fetch호출 하면 then도 동작을 해야 하는데 이는 data가 도착한 후에 동작을 함
    // then이 올때까지 기다렸다가 작동시키기 위해서
    // options 객체 ? 찾아볼것
    async function requestJson(url, options={}) {
        const response = await fetch(url, options);
        const text = await response.json(); // 결과문자열 -> javascript 객체 변환 (JSON.parse())
        let data = null;

        // 조회한 결과가 있다면
        if (text) {
            try {
                data = JSON.parse(text);    // text(JSON 문자열) -> Javascript 객체로 변환
            } catch (err) {
                data = text;        // 변환에 실패하면 그냥 문자열을 넣어라
            }
        }
        // 조회 status code 200이 아니면
        if(!response.ok){
            throw new Error(response.error);
        }
        return data;
    }
    // data 조작 끝
    /*-----------------------------------------------------------------------------------------*/

    // 프로그램이 시작되면
    // window.onload
    window.onload = function () {
        // 검색 버튼을 클릭하면 조회
        const btnOkEl = document.querySelector('#btnOk');
        btnOkEl.onclick =  async function () {
            try {
                await getUsers();
            } catch (err) {
                console.error(err);
                alert(err);
            }
        }
        btnOkEl.click();

        // div1 table 의 row을 더블클릭 했을때 input 요소에 값 전달하기
        // const tr = document.querySelector('#div1 tr:hover');
        // tr : Uncaught TypeError: Cannot read properties of null (reading 'addEventListener')
        // at window.onload
        // click을 해서 실행할 때 (동적으로) 생성된 element(tag)는 해당 선택자(#div1 tr:hover or #list tr:hover)로 찾지 못한다
        // 해결방법 : 미리 생성된, 부모역할을 하는 tag(<div id="div1">)에 이벤트를 걸어준다
        // div1El.addEventListener('mouseover', 마우스 hover되면 event
        const div1El = document.querySelector('#div1');
        div1El.addEventListener('dblclick', event => {
            /*console.log(event.target);*/ // td

            let tds = event.target.parentNode.children;
            //let tds = event.target.closest('tr').children;
            console.dir(tds);
            // HTMLCollection(5) [td, td, td, td, td] : 찾은게 tag collection일 때 forEach()로 출력 안됨
            /*tds.forEach(td => {
                console.dir(td);
            }) 안됨*/
            // 아래의 로 Array.from(tds).forEach는 출력됨

            const useridEl = document.getElementById('userid');
            const usernameEl = document.getElementById('username');
            const emailEl = document.getElementById('email');
            const indateEl = document.getElementById('indate');
            const passwdEl = document.getElementById('passwd');

            Array.from(tds).forEach((td,i) => {
                if (td.tagName != "TD") return;
                console.log(td)
                switch (i) {
                    case 0: useridEl.value = td.innerHTML; break;
                    case 1: usernameEl.value = td.innerHTML; break;
                    case 2: emailEl.value = td.innerHTML; break;
                    case 3: indateEl.value = td.innerHTML; break;
                }

            })
            // for 문 정상 동작함
            /*for (const td of tds) {
                console.dir(td);
            }*/
            // alert('메롱')
        })

        /*-------------------------------------------------------------------------------------*/
        // a tag를 버튼으로 사용하려면 기본 이벤트(href로의 이동)를 무력화해야됨
        // 추가 버튼 클릭
        const btnInsertEl = document.getElementById('btnInsert');
        btnInsertEl.addEventListener('click', async function (event) {
            //alert('추가')
            console.log(event)
            event.preventDefault(); // 기본 이벤트 취소
            event.stopPropagation();
            try {
                await data_insert();
            } catch (err) {
                console.log(err);
                alert("오류발생");
            }
        })
        // 수정 버튼 클릭
        const btnUpdateEl = document.getElementById('btnUpdate');
        btnUpdateEl.addEventListener('click', async function () {
            alert('수정')
        })

        // 삭제 버튼 클릭
        const btnDeleteEl = document.getElementById('btnDelete');
        btnDeleteEl.addEventListener('click', async function (event) {
            //alert('삭제')
            event.preventDefault(); // 기본 이벤트 제거
            event.stopPropagation(); // 이벤트 버블링 방지

            const useridEl = document.getElementById('userid');
            if (useridEl.value == '') return;

            let yes = confirm(useridEl.value + "를 삭제하시겠습니까?")

            if ( !yes || useridEl.value == "admin") return;


            try {
                await data_delete(useridEl.value);
            } catch (err) {
                console.log(err);
                alert('오류발생');
            }
        })

        // 삭제버튼 : 휴지통 아이콘 클릭 :
        // 실행시 생성된 버튼이라 검색 불가능임 document.querySelector('.btnDel'); -> null
        //
        div1El.addEventListener('click', async e => {
            e.preventDefault();
            e.stopPropagation();
            // el.closest('tr') : el의 가장 가까운 부모 tag
            console.dir(e.target.closest('tr'));
            const tr = e.target.closest('tr')
            const userid = tr.dataset.userid;
            alert(userid);
            let yes = confirm(userid + '를 삭제하시겠습니까?')

            if( !yes || userid == "admin" ) return;
            try {
                await data_delete(userid);
            } catch (err) {
                console.log(err);
                alert('오류발생');
            }
        })


        // clear 버튼 클릭
        const btnClearEl = document.getElementById('btnClear');
        btnClearEl.addEventListener('click', async function () {
            alert('clear')
            text_clear();
        })
    }
</script>
</body>
</html>
