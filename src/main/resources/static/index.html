<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>REST API User CRUD</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
    <style>
        main {width: 80%; margin: 30px auto;}
        table, tr, td {
            border-collapse: collapse;
            border: 1px solid #ccc;
        }
        tr, td {padding: 10px; text-align: center;}
        #div1 {margin-top: 30px; margin-bottom: 200px;}
        #list button {border:0; background: #fff;}
        #list tr:hover:not(:first-child) {background: yellow;}
        .form-table input {width: 260px;}
        .message {margin-top:15px; font-weight: 600;}
        .error {color: #b00020;}
        .success {color: #0a6b2b;}
    </style>
</head>
<body>
<main>
    <h2>회원 REST API 테스트</h2>
    <form id="form1">
        <table class="form-table">
            <tr>
                <td>아이디</td>
                <td><input type="text" id="userid" required></td>
            </tr>
            <tr>
                <td>암호</td>
                <td><input type="text" id="passwd" required></td>
            </tr>
            <tr>
                <td>이름</td>
                <td><input type="text" id="username" required></td>
            </tr>
            <tr>
                <td>이메일</td>
                <td><input type="email" id="email"></td>
            </tr>
            <tr>
                <td>가입일</td>
                <td><input type="text" id="indate" readonly></td>
            </tr>
            <tr>
                <td colspan="2">
                    <a id="btnInsert" class="btn btn-primary btn-sm" href="#">추가</a>
                    <a id="btnUpdate" class="btn btn-warning btn-sm" href="#">수정</a>
                    <a id="btnDelete" class="btn btn-danger btn-sm" href="#">삭제</a>
                    <input type="button" id="btnClear" class="btn btn-info btn-sm" value="Clear">
                </td>
            </tr>
        </table>
    </form>
    <div id="message" class="message"></div>
    <hr>
    <div>
        아이디<input type="text" id="text" placeholder="검색어"/>
        <button id="btnOk" class="btn btn-secondary btn-sm">검색</button>
    </div>

    <div id="div1"></div>
</main>
<!-- ---------------------------------------------------------------------------------------------- -->
<script>
    const API_URL = '/api/users'; // 기본 api 주소

    // display header 문자열 작업
    function table_header() {
        return `
            <tr>
                <th>아이디</th>
                <th>이름</th>
                <th>이메일</th>
                <th>가입일</th>
                <th>삭제</th>
            </tr>
        `;
    }

    // 조회한 datalist 출력
    function datalist_display(datalist) {
        let html = `<table id="list" class="table table-striped">`;
        html += table_header();
        datalist.forEach(user => {
            const userid = user.userid;
            const username = user.username;
            const email = user.email;
            const indate = user.indate;
            let tr = `
                <tr>
                    <td>${userid}</td>
                    <td>${username}</td>
                    <td>${email}</td>
                    <td>${indate}</td>
                    <td><button type="button" class="btnDel">🗑</button></td>
                </tr>
            `
            html += tr;
        })
        html += `</table>`;

        const div1El = document.getElementById('div1');
        div1El.innerHTML = html;
    }

    // data 조회
    // API_URL = '/aip/users'
    // GET http://localhost:8080/api/users
    // GET http://localhost:8080/api/users?keyword=user
    // encodeURIComponent가 필요한 이유는 주소줄은 bit로 단위로 돌아다님
    // 따라서 UTF-8로 변환해야함
    async function getUsers() {
        const keywordEl = document.getElementById('text');
        const keyword = keywordEl.value.trim();
        const url = (keyword)
            ? `${API_URL}?keyword=${encodeURIComponent(keyword)}`
            :API_URL;
        const datalist = await requestJson(url);
        datalist_display(datalist);
    }

    // requestJson 함수
    // 비동기 async
    // fetch호출 하면 then도 동작을 해야 하는데 이는 data가 도착한 후에 동작을 함
    // then이 올때까지 기다렸다가 작동시키기 위해서
    // options 객체 ? 찾아볼것
    async function requestJson(url, options={}) {
        const response = await fetch(url, options);
        const text = await response.json();
        let data = null;

        // 조회한 결과가 있다면
        if (text) {
            try {
                data = JSON.parse(text);    // text(JSON 문자열) -> Javascript 객체로 변환
            } catch (err) {
                data = text;        // 변환에 실패하면 그냥 문자열을 넣어라
            }
        }
        // 조회 status code 200이 아니면
        if(!response.ok){
            throw new Error(response.error);
        }
        return data;
    }

    // window.onload
    window.onload = function () {
        // 검색 버튼을 클릭하면 조회
        const btnOkEl = document.querySelector('#btnOk');
        btnOkEl.onclick = async function () {
            try {
                await getUsers();
            } catch (err) {
                console.error(err);
                alert(err);
            }
        }
    }
</script>
</body>
</html>
