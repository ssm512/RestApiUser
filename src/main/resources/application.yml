server:
  port: 8080

spring:
  application:
    name: PrjAjaxCRUD-restapi-boot4-jpa-oracle

  #html 소스, style 새로고침
  web:
    resources:
      static-locations:
        - file:src/main/resources/static/
        - classapth:/static
      cache:
        period: 0
        
  datasource:
    driver-class-name: oracle.jdbc.OracleDriver
    url: jdbc:oracle:thin:@localhost:11521/FREEPDB1
    username: spring
    password: 1234

  jpa:
    database-platform: org.hibernate.dialect.OracleDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace
